name: Release Obsidian Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags and history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from manifest
        id: get_version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag $VERSION already exists. Skipping release creation."
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag $VERSION does not exist yet. Proceeding with release."
          fi

      - name: Build plugin
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: npm run build

      - name: Package release files
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          # Verify required files exist
          if [ ! -f main.js ]; then
            echo "Error: main.js was not generated by the build process!"
            exit 1
          fi
          if [ ! -f manifest.json ]; then
            echo "Error: manifest.json does not exist!"
            exit 1
          fi
          if [ ! -f styles.css ]; then
            echo "Error: styles.css does not exist!"
            exit 1
          fi
          echo "All release files (main.js, manifest.json, styles.css) are present."

      - name: Create Git Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release version $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
